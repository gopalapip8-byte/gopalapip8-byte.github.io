<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>valznewera | Bio Links</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: white;
            text-align: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            overflow-x: hidden;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
            animation: muter 20s linear infinite;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        @keyframes muter {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        h1 {
            margin: 15px 0 5px 0;
            font-size: 28px;
        }
        .bio {
            margin: 0 0 25px 0;
            opacity: 0.9;
            line-height: 1.5;
        }
        .btn {
            display: block;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px;
            margin: 12px 0;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            transition: 0.3s;
            cursor: pointer;
        }
        .btn:hover {
            background-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.7);
            transform: scale(1.05);
        }
        #music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid white;
            color: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
        }
        .now-playing {
            position: fixed;
            bottom: 25px;
            right: 80px;
            background: rgba(0,0,0,0.5);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
        }
        /* GAME STYLING */
        #gameModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        #gameArea {
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.1);
            border: 2px solid white;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
        }
        #dot {
            width: 30px;
            height: 30px;
            background: #ff4757;
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            box-shadow: 0 0 15px #ff4757;
        }
        #gameInfo {
            color: white;
            margin-bottom: 15px;
            font-size: 18px;
        }
        #closeGame {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="container">
        <img src="foto.jpg" alt="Foto Profil" class="profile-img">
        <h1>valznewera ✅</h1>
        
        <div class="bio">
            <p>Editor | Gamers | Ngopi Dulu ☕</p>
            <p>Singosari, East Java 🇮🇩</p>
        </div>

        <a href="https://instagram.com/username_kamu" class="btn">Instagram 📷</a>
        <a href="https://wa.me/628123456789" class="btn">WhatsApp 💬</a>
        <a href="https://tiktok.com/@username_kamu" class="btn">TikTok 🎵</a>
        <a href="https://saweria.co/usernamekamu" class="btn">Saweria 💸</a>
        <div onclick="startGame()" class="btn">Main Game 🎮</div>
    </div>

    <!-- GAME MODAL -->
    <div id="gameModal">
        <div id="closeGame" onclick="closeGame()">×</div>
        <div>
            <div id="gameInfo">Skor: 0 | Waktu: 10</div>
            <div id="gameArea">
                <div id="dot" onclick="tambahSkor()"></div>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="musik.mp3" type="audio/mpeg">
    </audio>
    <div class="now-playing">🎵 Now Playing</div>
    <button id="music-btn">▶️</button>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": true },
                "size": { "value": 3, "random": true },
                "move": { "enable": true, "speed": 1.5 }
            }
        });

        const music = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-btn');
        musicBtn.onclick = function() {
            if (music.paused) {
                music.play();
                musicBtn.innerHTML = '⏸️';
            } else {
                music.pause();
                musicBtn.innerHTML = '▶️';
            }
        }

        // GAME LOGIC
        let skor = 0;
        let waktu = 10;
        let timer;
        const gameModal = document.getElementById('gameModal');
        const dot = document.getElementById('dot');
        const gameInfo = document.getElementById('gameInfo');

        function startGame() {
            skor = 0;
            waktu = 10;
            gameModal.style.display = 'flex';
            updateInfo();
            pindahDot();
            timer = setInterval(() => {
                waktu--;
                updateInfo();
                if (waktu <= 0) {
                    clearInterval(timer);
                    alert('Game Over! Skor lu: ' + skor);
                    closeGame();
                }
            }, 1000);
        }

        function tambahSkor() {
            skor++;
            updateInfo();
            pindahDot();
        }

        function pindahDot() {
            const x = Math.random() * 270;
            const y = Math.random() * 270;
            dot.style.left = x + 'px';
            dot.style.top = y + 'px';
        }

        function updateInfo() {
            gameInfo.innerHTML = 'Skor: ' + skor + ' | Waktu: ' + waktu;
        }

        function closeGame() {
            clearInterval(timer);
            gameModal.style.display = 'none';
        }
    </script>
</body>
</html>
